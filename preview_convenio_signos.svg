<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" style="max-width:680px;width:100%;height:auto;background:#fff;border-radius:6px;box-shadow:0 2px 10px rgba(0,0,0,.08);font-family:Barlow,sans-serif;">
  <!-- Título -->
  <text x="340" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1B4F8A">Convenio de signos de esfuerzos (sección genérica)</text>
  <text x="340" y="48" text-anchor="middle" font-size="12" fill="#555D6B">Fuerzas y momentos en caras cortadas del elemento diferencial</text>

  <!-- Marcas de definición -->
  <defs>
    <marker id="arrHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1B4F8A"/>
    </marker>
    <marker id="arrHeadOr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#C96B0E"/>
    </marker>
  </defs>

  <!-- ============= Elemento diferencial ============= -->
  <rect x="220" y="130" width="240" height="80" fill="#F4F6F9" stroke="#1B4F8A" stroke-width="2"/>
  <text x="340" y="175" text-anchor="middle" font-size="13" fill="#555D6B" font-style="italic">elemento diferencial</text>

  <!-- Indicación de caras -->
  <text x="205" y="175" text-anchor="end" font-size="11" fill="#8C97A8" font-style="italic">cara izq.</text>
  <text x="475" y="175" text-anchor="start" font-size="11" fill="#8C97A8" font-style="italic">cara der.</text>

  <!-- ============= NORMAL (N) — tracción positiva ============= -->
  <!-- Flecha izquierda apuntando hacia FUERA (izquierda) -->
  <line x1="220" y1="200" x2="170" y2="200" stroke="#1B4F8A" stroke-width="2.5" marker-end="url(#arrHead)"/>
  <text x="185" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#1B4F8A">N</text>
  <!-- Flecha derecha apuntando hacia FUERA (derecha) -->
  <line x1="460" y1="200" x2="510" y2="200" stroke="#1B4F8A" stroke-width="2.5" marker-end="url(#arrHead)"/>
  <text x="495" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#1B4F8A">N</text>

  <!-- ============= CORTANTE (V) ============= -->
  <!-- Cara izq: V hacia abajo -->
  <line x1="240" y1="130" x2="240" y2="95" stroke="#C96B0E" stroke-width="2.5" marker-end="url(#arrHeadOr)"/>
  <text x="240" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#C96B0E">V</text>
  <!-- Cara der: V hacia arriba -->
  <line x1="440" y1="210" x2="440" y2="245" stroke="#C96B0E" stroke-width="2.5" marker-end="url(#arrHeadOr)"/>
  <text x="440" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="#C96B0E">V</text>

  <!-- ============= MOMENTO FLECTOR (M) ============= -->
  <!-- Cara izq: flecha curva antihoraria -->
  <path d="M 200 150 A 20 20 0 1 0 200 190" fill="none" stroke="#1A6B3A" stroke-width="2.5" marker-end="url(#arrHead)" style="stroke:#1A6B3A" />
  <text x="175" y="173" text-anchor="middle" font-size="14" font-weight="700" fill="#1A6B3A">M</text>
  <!-- Cara der: flecha curva horaria -->
  <path d="M 480 190 A 20 20 0 1 0 480 150" fill="none" stroke="#1A6B3A" stroke-width="2.5" marker-end="url(#arrHead)" style="stroke:#1A6B3A" />
  <text x="505" y="173" text-anchor="middle" font-size="14" font-weight="700" fill="#1A6B3A">M</text>

  <!-- ============= LEYENDA ============= -->
  <g transform="translate(30, 290)">
    <!-- N -->
    <line x1="0" y1="6" x2="25" y2="6" stroke="#1B4F8A" stroke-width="2.5" marker-end="url(#arrHead)"/>
    <text x="35" y="10" font-size="12" fill="#23272F"><tspan font-weight="700" fill="#1B4F8A">N</tspan> (Normal) positiva → tracción (sale de la cara)</text>

    <!-- V -->
    <line x1="0" y1="30" x2="0" y2="14" stroke="#C96B0E" stroke-width="2.5" marker-end="url(#arrHeadOr)"/>
    <text x="35" y="32" font-size="12" fill="#23272F"><tspan font-weight="700" fill="#C96B0E">V</tspan> (Cortante) positivo → giro horario del elemento</text>

    <!-- M -->
    <path d="M -5 53 A 10 10 0 1 0 5 53" fill="none" stroke="#1A6B3A" stroke-width="2.5" marker-end="url(#arrHead)"/>
    <text x="35" y="56" font-size="12" fill="#23272F"><tspan font-weight="700" fill="#1A6B3A">M</tspan> (Momento flector) positivo → flexión que produce sonrisa (concavidad hacia arriba)</text>
  </g>
</svg>
